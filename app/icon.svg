<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="nodegrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  
  <!-- Edges -->
  <g stroke="url(#edge)" stroke-width="28" stroke-linecap="round">
    <line x1="140" y1="256" x2="256" y2="160" />
    <line x1="140" y1="256" x2="256" y2="352" />
    <line x1="256" y1="160" x2="372" y2="256" />
    <line x1="256" y1="352" x2="372" y2="256" />
  </g>
  
  <!-- Nodes -->
  <circle cx="140" cy="256" r="44" fill="url(#nodegrad)" />
  <circle cx="256" cy="160" r="44" fill="url(#nodegrad)" />
  <circle cx="256" cy="352" r="44" fill="url(#nodegrad)" />
  <circle cx="372" cy="256" r="44" fill="#f8fafc" />
  
  <!-- Inner ring for final node -->
  <circle cx="372" cy="256" r="18" fill="#1e1b4b" />
</svg>
